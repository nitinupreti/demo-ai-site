<!--/* Component: hero-teaser
     Wrapper is always rendered so authors can select the component in edit mode.
     Only the inner text/image nodes are conditionally hidden. */-->
<sly data-sly-use.model="com.demo.core.models.HeroTeaserModel"/>
<sly data-sly-use.clientlib="/libs/granite/sightly/templates/clientlib.html">
    <sly data-sly-call="${clientlib.css @ categories='demo-ai-site.components.hero-teaser'}"/>
</sly>
<section class="cmp-hero-teaser cmp-hero-teaser--${model.bgStyle @ context='attribute'}"
         data-cmp-is="hero-teaser">
    <div class="cmp-hero-teaser__container">
        <div class="cmp-hero-teaser__content">
            <sly data-sly-test="${model.hasText}">
                <div class="cmp-hero-teaser__text">
                    <h1 data-sly-test="${model.title}" class="cmp-hero-teaser__title">${model.title}</h1>
                    <p data-sly-test="${model.subtitle}" class="cmp-hero-teaser__subtitle">${model.subtitle}</p>
                </div>
                <a data-sly-test="${model.ctaLabel}"
                   class="cmp-hero-teaser__cta"
                   href="${model.ctaLink @ context='uri'}">${model.ctaLabel}</a>
            </sly>
        </div>
        <div class="cmp-hero-teaser__image">
            <div data-sly-resource="${'image' @ resourceType='core/wcm/components/image/v3/image'}"></div>
        </div>
    </div>
    <div data-sly-test="${!model.hasContent && wcmmode.edit}" class="cmp-empty-state">
        ${'Configure Hero Teaser…' @ i18n}
    </div>
</section>
